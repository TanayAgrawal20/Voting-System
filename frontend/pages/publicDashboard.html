<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Live Voting Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: 'Poppins', sans-serif;
        }

        .candidate-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: 0.25s;
        }

        .candidate-card:hover {
            transform: scale(1.01);
        }

        .candidate-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .candidate-info img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        .vote-count {
            font-size: 26px;
            font-weight: 700;
            color: #0d6efd;
        }
    </style>
</head>

<body>

    <header class="d-flex justify-content-between align-items-center px-4 py-3 bg-white shadow-sm">
        <h3 class="m-0">Live Voting Dashboard</h3>
        <div>
            Election: <span id="electionName" class="fw-bold text-primary">—</span>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4">

            <!-- LIVE VOTES -->
            <div class="col-lg-6">
                <h5 class="mb-3">Live Vote Count</h5>
                <div id="voteList"></div>
            </div>

            <!-- GRAPH -->
            <div class="col-lg-6">
                <h5 class="mb-3">Vote Comparison</h5>
                <div class="bg-white p-3 rounded shadow-sm">
                    <canvas id="voteChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/frontend/js/public-dashboard-live.js"></script>

</body>

</html>
